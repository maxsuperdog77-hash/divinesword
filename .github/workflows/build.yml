name: Build Divine Sword Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          export PATH=$PATH:$PWD/gradle-8.4/bin

      - name: Unzip mod source
        run: unzip divinesword_mod.zip

      - name: Build with Gradle
        run: |
          export PATH=$PATH:$PWD/gradle-8.4/bin
          cd divinesword
          gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: divinesword-mod
          path: divinesword/build/libs/*.jar
