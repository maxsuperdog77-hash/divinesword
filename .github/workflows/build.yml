name: Build Divine Sword Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip mod source
        run: unzip divinesword_mod.zip

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        working-directory: divinesword
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: divinesword-mod
          path: divinesword/build/libs/*.jar
